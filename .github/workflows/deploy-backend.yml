name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ main ]
    paths:
      - 'WordSoulApi/**'

env:
  API_PROJECT: './WordSoulApi/WordSoul.Api/WordSoul.Api.csproj'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore ${{ env.API_PROJECT }}

    - name: Build
      run: dotnet build ${{ env.API_PROJECT }} --configuration Release --no-restore

    - name: Run EF Migrations
      run: |
        dotnet tool install --global dotnet-ef
        export PATH="$PATH:$HOME/.dotnet/tools"
        dotnet ef database update \
          --project ./WordSoulApi/WordSoul.Infrastructure/WordSoul.Infrastructure.csproj \
          --startup-project ${{ env.API_PROJECT }} \
          --configuration Release
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

    - name: Publish
      run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --output ./publish

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'wordsoul-api-dev'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
