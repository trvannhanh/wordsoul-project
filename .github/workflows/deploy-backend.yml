name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ main ]        # ← đổi thành nhánh của bạn nếu khác
    paths:
      - 'WordSoulApi/**'      # ← chỉ trigger khi có thay đổi trong folder backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore ./WordSoulApi/WordSoulApi.csproj   # ← đổi tên .csproj cho đúng

    - name: Build
      run: dotnet build ./WordSoulApi/WordSoulApi.csproj --configuration Release --no-restore

    - name: Run EF Migrations
      run: |
        dotnet tool install --global dotnet-ef
        export PATH="$PATH:$HOME/.dotnet/tools"
        dotnet ef database update --project ./WordSoulApi/WordSoulApi.csproj --configuration Release
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

    - name: Publish
      run: dotnet publish ./WordSoulApi/WordSoulApi.csproj --configuration Release --output ./publish

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'wordsoul-api-dev'        # ← đổi thành tên App Service của bạn
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
