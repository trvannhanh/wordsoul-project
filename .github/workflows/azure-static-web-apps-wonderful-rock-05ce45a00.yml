name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # ← Tự build thủ công, không dùng Oryx
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'        # dùng Node 20 LTS thay vì 22

      - name: Install dependencies
        working-directory: ./wordsoul-app
        run: |
          rm -f package-lock.json
          npm install

      - name: Build
        working-directory: ./wordsoul-app
        run: npm run build
        env:
          VITE_API_URL: https://wordsoul-api-dev-hybybqh9dhhzhped.southeastasia-01.azurewebsites.net

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_ROCK_05CE45A00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./wordsoul-app"
          api_location: ""
          output_location: "dist"
          skip_app_build: true      # ← quan trọng: bỏ qua Oryx build vì đã build ở trên

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_ROCK_05CE45A00 }}
          action: "close"
